<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="F.R.A.P Charts" />
<title>F.R.A.P Charts</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2312161c'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='%23C9A227' font-family='Georgia,serif'%3E🏆%3C/text%3E%3C/svg%3E" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Lora:ital,wght@0,500;0,600;1,500&display=swap');
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #12161c; }
  #root { min-height: 100vh; }
  ::-webkit-scrollbar { height: 6px; width: 6px; }
  ::-webkit-scrollbar-thumb { background: #2a3140; border-radius: 4px; }
  .cat-chip:hover { border-color: #C9A227 !important; }
  .item-row:hover { border-color: #3a4358; }
  .icon-btn:hover { background: #262d3a; color: #EDEAE0; }
  .icon-btn:disabled { opacity: 0.25; cursor: default; }
  input::placeholder, textarea::placeholder { color: #5c6478; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useReducer, useEffect, useRef, useState } = React;

const STORAGE_KEY = "frap-charts-data";
const MEDALS = ["🥇", "🥈", "🥉"];

const INITIAL_STATE = {
  loaded: false,
  categories: [
    { id: "filmes", name: "Filmes" },
    { id: "albuns", name: "Álbuns" },
    { id: "lol", name: "League Esports" },
  ],
  items: [],
  activeCategory: "filmes",
};

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function reducer(state, action) {
  switch (action.type) {
    case "HYDRATE": {
      const categories = action.data.categories && action.data.categories.length ? action.data.categories : state.categories;
      return { ...state, categories, items: action.data.items || [], activeCategory: categories[0].id, loaded: true };
    }
    case "MARK_LOADED":
      return { ...state, loaded: true };
    case "SET_ACTIVE_CATEGORY":
      return { ...state, activeCategory: action.id };
    case "ADD_CATEGORY": {
      const id = uid();
      return { ...state, categories: [...state.categories, { id, name: action.name }], activeCategory: id };
    }
    case "REMOVE_CATEGORY": {
      if (state.categories.length <= 1) return state;
      const categories = state.categories.filter((c) => c.id !== action.id);
      const items = state.items.filter((i) => i.categoryId !== action.id);
      const activeCategory = state.activeCategory === action.id ? categories[0].id : state.activeCategory;
      return { ...state, categories, items, activeCategory };
    }
    case "ADD_ITEM": {
      const inCategory = state.items.filter((i) => i.categoryId === state.activeCategory);
      const now = Date.now();
      const item = { id: uid(), categoryId: state.activeCategory, name: action.name, position: inCategory.length, positionSince: now, history: [], photo: null, comment: "" };
      return { ...state, items: [...state.items, item] };
    }
    case "REMOVE_ITEM":
      return { ...state, items: state.items.filter((i) => i.id !== action.id) };
    case "MOVE_ITEM": {
      const list = state.items.filter((i) => i.categoryId === state.activeCategory).sort((a, b) => a.position - b.position);
      const idx = list.findIndex((i) => i.id === action.id);
      const swapIdx = idx + action.direction;
      if (idx === -1 || swapIdx < 0 || swapIdx >= list.length) return state;
      const now = Date.now();
      const a = list[idx];
      const b = list[swapIdx];
      const updatedA = { ...a, position: b.position, positionSince: now, history: [...a.history, { position: a.position, from: a.positionSince, to: now }] };
      const updatedB = { ...b, position: a.position, positionSince: now, history: [...b.history, { position: b.position, from: b.positionSince, to: now }] };
      return { ...state, items: state.items.map((i) => (i.id === updatedA.id ? updatedA : i.id === updatedB.id ? updatedB : i)) };
    }
    case "UPDATE_ITEM":
      return { ...state, items: state.items.map((i) => (i.id === action.id ? { ...i, ...action.patch } : i)) };
    default:
      return state;
  }
}

function compressImage(file, maxSize = 480, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Falha ao ler o arquivo"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("Falha ao carregar a imagem"));
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxSize) { height = Math.round((height * maxSize) / width); width = maxSize; }
        else if (height > maxSize) { width = Math.round((width * maxSize) / height); height = maxSize; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function daysSince(ts) {
  const d = Math.floor((Date.now() - ts) / 86400000);
  if (d <= 0) return "hoje";
  if (d === 1) return "1 dia";
  return `${d} dias`;
}

function computeStats(item, currentPosition) {
  const entries = [...item.history.map((h) => ({ position: h.position, from: h.from, to: h.to })), { position: currentPosition, from: item.positionSince, to: Date.now() }];
  const totals = { 0: 0, 1: 0, 2: 0 };
  let weightedSum = 0, totalDuration = 0;
  entries.forEach((e) => {
    const duration = Math.max(0, e.to - e.from);
    if (e.position <= 2) totals[e.position] += duration;
    weightedSum += duration * (e.position + 1);
    totalDuration += duration;
  });
  const avgPosition = totalDuration > 0 ? weightedSum / totalDuration : currentPosition + 1;
  const fmt = (ms) => { const d = Math.round(ms / 86400000); if (d <= 0) return "menos de 1 dia"; if (d === 1) return "1 dia"; return `${d} dias`; };
  return { gold: fmt(totals[0]), silver: fmt(totals[1]), bronze: fmt(totals[2]), avgPosition: avgPosition.toFixed(1) };
}

function useLocalSave(state) {
  const [status, setStatus] = useState("idle");
  const debounceRef = useRef(null);

  useEffect(() => {
    if (!state.loaded) return;
    setStatus("saving");
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ categories: state.categories, items: state.items }));
        setStatus("saved");
      } catch (e) {
        setStatus("error");
      }
    }, 300);
    // eslint-disable-next-line
  }, [state.categories, state.items, state.loaded]);

  return status;
}

function FrapCharts() {
  const [state, dispatch] = useReducer(reducer, INITIAL_STATE);
  const status = useLocalSave(state);
  const [newItemName, setNewItemName] = useState("");
  const [newCategoryName, setNewCategoryName] = useState("");
  const [addingCategory, setAddingCategory] = useState(false);
  const [detailFor, setDetailFor] = useState(null);
  const [commentDraft, setCommentDraft] = useState("");
  const [photoError, setPhotoError] = useState("");

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) { dispatch({ type: "HYDRATE", data: JSON.parse(raw) }); return; }
    } catch (e) {}
    dispatch({ type: "MARK_LOADED" });
  }, []);

  const categoryItems = state.items.filter((i) => i.categoryId === state.activeCategory).sort((a, b) => a.position - b.position);
  const activeCatObj = state.categories.find((c) => c.id === state.activeCategory);
  const detailItem = state.items.find((i) => i.id === detailFor);

  useEffect(() => {
    setCommentDraft(detailItem ? detailItem.comment || "" : "");
    setPhotoError("");
    // eslint-disable-next-line
  }, [detailFor]);

  function addItem() {
    const name = newItemName.trim();
    if (!name) return;
    dispatch({ type: "ADD_ITEM", name });
    setNewItemName("");
  }
  function addCategory() {
    const name = newCategoryName.trim();
    if (!name) return;
    dispatch({ type: "ADD_CATEGORY", name });
    setNewCategoryName("");
    setAddingCategory(false);
  }
  async function handlePhotoChange(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file || !detailFor) return;
    if (!file.type.startsWith("image/")) { setPhotoError("Escolha um arquivo de imagem."); return; }
    try {
      setPhotoError("");
      const dataUrl = await compressImage(file);
      dispatch({ type: "UPDATE_ITEM", id: detailFor, patch: { photo: dataUrl } });
    } catch (err) {
      setPhotoError("Não consegui processar essa imagem.");
    }
  }

  return (
    <div style={styles.page}>
      <header style={styles.header}><h1 style={styles.title}>F.R.A.P Charts</h1></header>

      <nav style={styles.tabs}>
        {state.categories.map((c) => (
          <button key={c.id} className="cat-chip" onClick={() => dispatch({ type: "SET_ACTIVE_CATEGORY", id: c.id })}
            style={{ ...styles.chip, ...(c.id === state.activeCategory ? styles.chipActive : {}) }}>
            {c.name}
          </button>
        ))}
        {addingCategory ? (
          <div style={styles.newCatForm}>
            <input autoFocus value={newCategoryName} onChange={(e) => setNewCategoryName(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && addCategory()} placeholder="Nome da categoria" style={styles.newCatInput} />
            <button onClick={addCategory} style={styles.smallBtn}>+</button>
            <button onClick={() => setAddingCategory(false)} style={styles.smallBtn}>×</button>
          </div>
        ) : (
          <button onClick={() => setAddingCategory(true)} style={styles.addCatBtn}>+ categoria</button>
        )}
      </nav>

      <main style={styles.main}>
        {categoryItems.length === 0 ? (
          <div style={styles.empty}>Nenhum item em <strong>{activeCatObj && activeCatObj.name}</strong> ainda. Adicione o primeiro abaixo.</div>
        ) : (
          <ol style={styles.list}>
            {categoryItems.map((item, idx) => (
              <li key={item.id} className="item-row" style={styles.row}>
                <span style={styles.rank}>{idx < 3 ? MEDALS[idx] : idx + 1}</span>
                <button onClick={() => setDetailFor(item.id)} style={styles.thumbBtn}>
                  {item.photo ? <img src={item.photo} alt="" style={styles.thumbImg} /> : <span style={styles.thumbPlaceholder}>{item.name.charAt(0).toUpperCase()}</span>}
                </button>
                <div style={styles.rowMain}>
                  <button onClick={() => setDetailFor(item.id)} style={styles.itemNameBtn}><span style={styles.itemName}>{item.name}</span></button>
                  {item.comment && <span style={styles.commentPreview}>{item.comment}</span>}
                  <button onClick={() => setDetailFor(item.id)} style={styles.timeBadge}>⏱ {daysSince(item.positionSince)} nesta posição</button>
                </div>
                <div style={styles.rowActions}>
                  <button className="icon-btn" style={styles.iconBtn} onClick={() => dispatch({ type: "MOVE_ITEM", id: item.id, direction: -1 })} disabled={idx === 0}>▲</button>
                  <button className="icon-btn" style={styles.iconBtn} onClick={() => dispatch({ type: "MOVE_ITEM", id: item.id, direction: 1 })} disabled={idx === categoryItems.length - 1}>▼</button>
                  <button className="icon-btn" style={styles.iconBtn} onClick={() => dispatch({ type: "REMOVE_ITEM", id: item.id })}>🗑</button>
                </div>
              </li>
            ))}
          </ol>
        )}

        <div style={styles.addRow}>
          <input value={newItemName} onChange={(e) => setNewItemName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addItem()}
            placeholder={`Adicionar a ${activeCatObj ? activeCatObj.name : ""}`} style={styles.addInput} />
          <button onClick={addItem} style={styles.addBtn}>+ Adicionar</button>
        </div>

        {state.categories.length > 1 && (
          <button onClick={() => dispatch({ type: "REMOVE_CATEGORY", id: state.activeCategory })} style={styles.removeCatBtn}>
            Remover categoria "{activeCatObj && activeCatObj.name}"
          </button>
        )}

        <div style={styles.statusRow}>
          {status === "saving" && <span style={styles.statusSaving}>Salvando…</span>}
          {status === "saved" && <span style={styles.statusSaved}>Salvo ✓</span>}
          {status === "error" && <span style={{ ...styles.statusSaving, color: "#C1543C" }}>Não consegui salvar neste dispositivo.</span>}
        </div>
      </main>

      {detailItem && (
        <div style={styles.modalOverlay} onClick={() => setDetailFor(null)}>
          <div style={styles.modal} onClick={(e) => e.stopPropagation()}>
            <div style={styles.modalHeader}>
              <h2 style={styles.modalTitle}>{detailItem.name}</h2>
              <button onClick={() => setDetailFor(null)} style={styles.smallBtn}>×</button>
            </div>

            <div style={styles.photoSection}>
              {detailItem.photo ? (
                <div style={styles.photoPreviewWrap}>
                  <img src={detailItem.photo} alt="" style={styles.photoPreview} />
                  <button onClick={() => dispatch({ type: "UPDATE_ITEM", id: detailFor, patch: { photo: null } })} style={styles.photoRemoveBtn}>Remover foto</button>
                </div>
              ) : (
                <label style={styles.photoUploadLabel}>
                  📷 <span>Adicionar foto</span>
                  <input type="file" accept="image/*" onChange={handlePhotoChange} style={{ display: "none" }} />
                </label>
              )}
              {photoError && <span style={styles.photoErrorText}>{photoError}</span>}
            </div>

            <textarea value={commentDraft} onChange={(e) => setCommentDraft(e.target.value)}
              onBlur={() => dispatch({ type: "UPDATE_ITEM", id: detailFor, patch: { comment: commentDraft } })}
              placeholder="Escreva um comentário sobre este item..." style={styles.commentInput} rows={3} />

            <p style={styles.modalSubtitle}>Histórico de posições</p>
            {detailItem.history.length === 0 ? (
              <p style={styles.modalEmpty}>Ainda não mudou de posição desde que entrou no ranking.</p>
            ) : (
              <ul style={styles.historyList}>
                {[...detailItem.history].reverse().map((h, i) => {
                  const durationDays = Math.max(1, Math.round((h.to - h.from) / 86400000));
                  return (
                    <li key={i} style={styles.historyItem}>
                      <span style={styles.historyRank}>#{h.position + 1}</span>
                      <span style={styles.historyDuration}>{durationDays} {durationDays === 1 ? "dia" : "dias"}</span>
                    </li>
                  );
                })}
              </ul>
            )}

            <div style={styles.historyCurrentRow}>
              <span style={styles.historyRank}>#{categoryItems.findIndex((i) => i.id === detailItem.id) + 1} (atual)</span>
              <span style={styles.historyDuration}>{daysSince(detailItem.positionSince)}</span>
            </div>

            {(() => {
              const currentPos = categoryItems.findIndex((i) => i.id === detailItem.id);
              const stats = computeStats(detailItem, currentPos);
              return (
                <div style={styles.statsBlock}>
                  <div style={styles.statsRow}><span style={styles.statsLabel}>🥇 Ouro</span><span style={styles.historyDuration}>{stats.gold}</span></div>
                  <div style={styles.statsRow}><span style={styles.statsLabel}>🥈 Prata</span><span style={styles.historyDuration}>{stats.silver}</span></div>
                  <div style={styles.statsRow}><span style={styles.statsLabel}>🥉 Bronze</span><span style={styles.historyDuration}>{stats.bronze}</span></div>
                  <div style={styles.statsRow}><span style={styles.statsLabel}>Posição média</span><span style={styles.historyDuration}>#{stats.avgPosition}</span></div>
                </div>
              );
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

const styles = {
  page: { minHeight: "100vh", background: "#12161c", color: "#EDEAE0", fontFamily: "'Lora', serif", padding: "28px 18px 60px", display: "flex", flexDirection: "column", gap: 20 },
  header: { textAlign: "left" },
  title: { fontFamily: "'Oswald', sans-serif", fontSize: 34, fontWeight: 700, margin: 0, letterSpacing: "-0.01em" },
  tabs: { display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" },
  chip: { fontFamily: "'Oswald', sans-serif", fontSize: 13, padding: "8px 14px", borderRadius: 999, border: "1px solid #2a3140", background: "#1b212b", color: "#8b93a1", cursor: "pointer" },
  chipActive: { background: "#C9A227", borderColor: "#C9A227", color: "#12161c", fontWeight: 600 },
  addCatBtn: { fontFamily: "'Oswald', sans-serif", fontSize: 12, display: "flex", alignItems: "center", gap: 4, padding: "8px 12px", borderRadius: 999, border: "1px dashed #3a4358", background: "transparent", color: "#5c6478", cursor: "pointer" },
  newCatForm: { display: "flex", gap: 6, alignItems: "center" },
  newCatInput: { fontFamily: "'Lora', serif", fontSize: 13, padding: "8px 10px", borderRadius: 8, border: "1px solid #2a3140", background: "#1b212b", color: "#EDEAE0", outline: "none", width: 140 },
  smallBtn: { display: "flex", alignItems: "center", justifyContent: "center", width: 30, height: 30, borderRadius: 8, border: "1px solid #2a3140", background: "#1b212b", color: "#8b93a1", cursor: "pointer" },
  main: { display: "flex", flexDirection: "column", gap: 14 },
  empty: { color: "#5c6478", fontSize: 14, padding: "24px 0", borderTop: "1px solid #202632" },
  list: { listStyle: "none", margin: 0, padding: 0, display: "flex", flexDirection: "column", gap: 8 },
  row: { display: "flex", alignItems: "center", gap: 14, background: "#1b212b", border: "1px solid #232a37", borderRadius: 12, padding: "12px 14px" },
  rank: { fontFamily: "'Oswald', sans-serif", fontSize: 20, fontWeight: 700, color: "#C9A227", width: 28, textAlign: "center", flexShrink: 0 },
  thumbBtn: { width: 40, height: 40, borderRadius: 10, overflow: "hidden", border: "1px solid #2a3140", background: "#12161c", padding: 0, cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" },
  thumbImg: { width: "100%", height: "100%", objectFit: "cover" },
  thumbPlaceholder: { fontFamily: "'Oswald', sans-serif", fontSize: 15, color: "#5c6478" },
  rowMain: { flex: 1, minWidth: 0, display: "flex", flexDirection: "column", gap: 4 },
  itemNameBtn: { background: "transparent", border: "none", padding: 0, textAlign: "left", cursor: "pointer", width: "100%" },
  itemName: { fontSize: 16, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", display: "block", color: "#EDEAE0" },
  commentPreview: { fontSize: 12, color: "#8b93a1", fontStyle: "italic", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" },
  timeBadge: { fontFamily: "'Oswald', sans-serif", fontSize: 11, color: "#8b93a1", background: "transparent", border: "none", padding: 0, display: "flex", alignItems: "center", cursor: "pointer", width: "fit-content" },
  rowActions: { display: "flex", gap: 2, flexShrink: 0 },
  iconBtn: { display: "flex", alignItems: "center", justifyContent: "center", width: 30, height: 30, borderRadius: 8, border: "none", background: "transparent", color: "#8b93a1", cursor: "pointer", fontSize: 14 },
  addRow: { display: "flex", gap: 8, marginTop: 4 },
  addInput: { flex: 1, fontFamily: "'Lora', serif", fontSize: 14, padding: "12px 14px", borderRadius: 10, border: "1px solid #2a3140", background: "#1b212b", color: "#EDEAE0", outline: "none" },
  addBtn: { fontFamily: "'Oswald', sans-serif", fontSize: 13, fontWeight: 600, display: "flex", alignItems: "center", gap: 6, padding: "0 16px", borderRadius: 10, border: "none", background: "#C9A227", color: "#12161c", cursor: "pointer" },
  removeCatBtn: { alignSelf: "flex-start", fontFamily: "'Oswald', sans-serif", fontSize: 11, color: "#5c6478", background: "transparent", border: "none", textDecoration: "underline", cursor: "pointer", padding: 0, marginTop: 4 },
  statusRow: { minHeight: 20 },
  statusSaving: { fontSize: 11, color: "#5c6478", fontFamily: "'Oswald', sans-serif" },
  statusSaved: { fontSize: 11, color: "#4CAF6D", fontFamily: "'Oswald', sans-serif" },
  modalOverlay: { position: "fixed", inset: 0, background: "rgba(10,12,16,0.7)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 50 },
  modal: { background: "#1b212b", borderTopLeftRadius: 18, borderTopRightRadius: 18, border: "1px solid #2a3140", borderBottom: "none", padding: "20px 20px 28px", width: "100%", maxWidth: 480, maxHeight: "70vh", overflowY: "auto" },
  modalHeader: { display: "flex", justifyContent: "space-between", alignItems: "center" },
  modalTitle: { fontFamily: "'Oswald', sans-serif", fontSize: 18, margin: 0 },
  modalSubtitle: { color: "#8b93a1", fontSize: 12, marginTop: 4, marginBottom: 12 },
  modalEmpty: { color: "#5c6478", fontSize: 13 },
  photoSection: { marginTop: 14, marginBottom: 12 },
  photoUploadLabel: { display: "flex", alignItems: "center", gap: 8, justifyContent: "center", padding: "18px", borderRadius: 10, border: "1px dashed #3a4358", color: "#8b93a1", fontFamily: "'Oswald', sans-serif", fontSize: 13, cursor: "pointer" },
  photoPreviewWrap: { display: "flex", flexDirection: "column", gap: 8 },
  photoPreview: { width: "100%", maxHeight: 220, objectFit: "cover", borderRadius: 10, border: "1px solid #2a3140" },
  photoRemoveBtn: { alignSelf: "flex-start", display: "flex", alignItems: "center", fontFamily: "'Oswald', sans-serif", fontSize: 11, color: "#C1543C", background: "transparent", border: "none", cursor: "pointer", padding: 0 },
  photoErrorText: { display: "block", marginTop: 6, fontSize: 12, color: "#C1543C" },
  commentInput: { width: "100%", fontFamily: "'Lora', serif", fontSize: 14, padding: "10px 12px", borderRadius: 10, border: "1px solid #2a3140", background: "#12161c", color: "#EDEAE0", outline: "none", resize: "vertical", marginBottom: 14 },
  historyList: { listStyle: "none", margin: 0, padding: 0, display: "flex", flexDirection: "column", gap: 6 },
  historyItem: { display: "flex", justifyContent: "space-between", padding: "8px 10px", borderRadius: 8, background: "#12161c", fontFamily: "'Oswald', sans-serif", fontSize: 13 },
  historyRank: { color: "#C9A227", fontWeight: 600 },
  historyDuration: { color: "#8b93a1" },
  historyCurrentRow: { display: "flex", justifyContent: "space-between", padding: "10px 10px", borderRadius: 8, background: "rgba(201,162,39,0.12)", border: "1px solid rgba(201,162,39,0.3)", fontFamily: "'Oswald', sans-serif", fontSize: 13, marginTop: 6 },
  statsBlock: { marginTop: 14, paddingTop: 12, borderTop: "1px solid #232a37", display: "flex", flexDirection: "column", gap: 6 },
  statsRow: { display: "flex", justifyContent: "space-between", fontFamily: "'Oswald', sans-serif", fontSize: 13 },
  statsLabel: { color: "#8b93a1" },
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<FrapCharts />);
</script>
</body>
</html>
